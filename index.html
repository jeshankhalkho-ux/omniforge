<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Tools | Privacy-First Browser Tools Suite</title>
    <meta name="description" content="Free, 100% local, high-performance browser tools for PDFs, Images, Videos, Text, and Security. No server uploads. Absolute privacy." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #4facfe;"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span>Daily Tools</span>
          </div>
          <button class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon-dark"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
        </div>

        <div class="search-container">
          <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" class="search-input" id="toolSearch" placeholder="Search 30+ tools..." />
          </div>
        </div>

        <nav class="sidebar-nav">
          <!-- Documents Section -->
          <div class="nav-section">
            <div class="nav-section-title" style="color: var(--cat-doc);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
              <span>Document Tools</span>
            </div>
            <ul class="nav-list" id="navDocs">
              <!-- Dynamically populated/interacted -->
            </ul>
          </div>

          <!-- Images Section -->
          <div class="nav-section">
            <div class="nav-section-title" style="color: var(--cat-img);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
              <span>Image Tools</span>
            </div>
            <ul class="nav-list" id="navImages">
              <!-- Dynamically populated/interacted -->
            </ul>
          </div>

          <!-- Videos Section -->
          <div class="nav-section">
            <div class="nav-section-title" style="color: var(--cat-vid);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
              <span>Video Tools</span>
            </div>
            <ul class="nav-list" id="navVideos">
              <!-- Dynamically populated/interacted -->
            </ul>
          </div>

          <!-- Text Section -->
          <div class="nav-section">
            <div class="nav-section-title" style="color: var(--cat-txt);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 6.1H3"/><path d="M21 12.1H3"/><path d="M15.1 18H3"/></svg>
              <span>Text Tools</span>
            </div>
            <ul class="nav-list" id="navText">
              <!-- Dynamically populated/interacted -->
            </ul>
          </div>

          <!-- Privacy/Security Section -->
          <div class="nav-section">
            <div class="nav-section-title" style="color: var(--cat-sec);">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <span>Security Tools</span>
            </div>
            <ul class="nav-list" id="navSecurity">
              <!-- Dynamically populated/interacted -->
            </ul>
          </div>
        </nav>
      </aside>

      <!-- Main Viewport -->
      <main class="main-viewport">
        <header class="top-header">
          <div class="header-title-area">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <h2 class="current-tool-title" id="topHeaderTitle">Daily Tools Dashboard</h2>
          </div>
          <div class="header-actions">
            <span class="quick-tag">100% Client-Side</span>
            <span class="quick-tag" style="background: rgba(45, 212, 191, 0.1); color: var(--cat-img); border-color: rgba(45, 212, 191, 0.2);">No Server Uploads</span>
          </div>
        </header>

        <div class="content-wrapper" id="contentWrapper">
          <!-- Dynamic Content Loaded Here (Dashboard or Active Tool Workspace) -->
        </div>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
